version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: retiler-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - retiler-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: retiler-minio
    environment:
      MINIO_ROOT_USER: accessKeyId
      MINIO_ROOT_PASSWORD: secretkey
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - retiler-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # creates the bucket automatically on first run
  minio-init:
    image: minio/mc
    container_name: retiler-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 accessKeyId secretkey &&
      mc mb --ignore-existing local/bucket-name &&
      exit 0
      "

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm-stack
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '3000:3000' # Grafana UI
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
      - '9090:9090' # Prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - lgtm-data:/data
      - ./observability/prometheus.yml:/otel-lgtm/prometheus.yaml

volumes:
  retiler-pgdata:
  retiler-minio-data:
  lgtm-data:
